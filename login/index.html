<!DOCTYPE html>
<html>
<head>
<title>Login & Register</title>

<script>
function registerUser() {

let email = document.getElementById("reg_email").value;
let name = document.getElementById("reg_name").value;
let password = document.getElementById("reg_password").value;

let xhr = new XMLHttpRequest();
xhr.open("POST","https://enterpriselogin1.vercel.app/api/auth/register",true);
xhr.setRequestHeader("Content-type","application/x-www-form-urlencoded");

xhr.onload = function(){
document.getElementById("reg_result").innerHTML = this.responseText;
};

xhr.send(JSON.stringify({
name:name,
email:email,
password:password
}));
}

  function reg1(){

let email = document.getElementById("reg_email").value;
let name = document.getElementById("reg_name").value;
let password = document.getElementById("reg_password").value;
// WARNING: For POST requests, body is set to null by browsers.
var data = JSON.stringify({
  "name": name,
  "email": email,
  "password": password
});

var xhr = new XMLHttpRequest();
xhr.withCredentials = true;

xhr.addEventListener("readystatechange", function() {
  if(this.readyState === 4) {
    console.log(this.responseText);
  }
});

xhr.open("POST", "https://enterpriselogin1.vercel.app/api/auth/register/");
xhr.setRequestHeader("Content-Type", "application/json");

xhr.send(data);
    
  }

function loginUser() {

let email = document.getElementById("log_email").value;
let password = document.getElementById("log_password").value;

let xhr = new XMLHttpRequest();
xhr.open("POST","https://enterpriselogin1.vercel.app/api/auth/login",true);
xhr.setRequestHeader("Content-type","application/x-www-form-urlencoded");

xhr.onload = function(){
document.getElementById("log_result").innerHTML = this.responseText;
};

xhr.send("email="+email+"&password="+password);
}
</script>

</head>
<body>

<h2>Register</h2>
<input type="text" id="reg_name" placeholder="name">
<br><br>
<input type="text" id="reg_email" placeholder="email">
<br><br>

<input type="password" id="reg_password" placeholder="Password">
<br><br>

<button onclick="reg1()">Register</button>

<p id="reg_result"></p>


<hr>


<h2>Login</h2>

<input type="text" id="log_email" placeholder="email">
<br><br>

<input type="password" id="log_password" placeholder="Password">
<br><br>

<button onclick="loginUser()">Login</button>

<p id="log_result"></p>

</body>
</html>
