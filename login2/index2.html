<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#4338ca;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
border-bottom:2px solid #ddd;
}

.active{
border-bottom:3px solid #4f46e5;
font-weight:bold;
}

.message{
text-align:center;
margin-top:10px;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="showForm('login')">Login</div>
<div class="tab" onclick="showForm('register')">Register</div>
</div>

<!-- LOGIN -->
<form id="loginForm">

<input type="email" id="login_email" placeholder="Email" required>

<input type="password" id="login_password" placeholder="Password" required>

<button type="submit">Login</button>

<div id="loginMsg" class="message"></div>

</form>

<!-- REGISTER -->
<form id="registerForm" style="display:none">

<input type="text" id="reg_name" placeholder="Full Name" required>

<input type="email" id="reg_email" placeholder="Email" required>

<input type="password" id="reg_password" placeholder="Password" required>

<button type="submit">Register</button>

<div id="regMsg" class="message"></div>

</form>

</div>

<script>

function showForm(type){

document.getElementById("loginForm").style.display =
type==="login" ? "block":"none";

document.getElementById("registerForm").style.display =
type==="register" ? "block":"none";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

if(type==="login")
document.querySelectorAll(".tab")[0].classList.add("active");
else
document.querySelectorAll(".tab")[1].classList.add("active");

}

function sendRequest(url,data,msgId){

let xhr = new XMLHttpRequest();

xhr.open("POST",url,true);

xhr.setRequestHeader("Content-Type","application/json");

xhr.onload = function(){

let res;

try{
res = JSON.parse(xhr.responseText);
}catch{
res = {message:xhr.responseText};
}

document.getElementById(msgId).innerText =
res.message || "Request finished";

};

xhr.onerror = function(){
document.getElementById(msgId).innerText="Network error";
};

xhr.send(JSON.stringify(data));

}

/* LOGIN */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let email = document.getElementById("login_email").value;
let password = document.getElementById("login_password").value;

sendRequest(
"https://enterpriselogin1.vercel.app/api/auth/login",
{email,password},
"loginMsg"
);

});

/* REGISTER */

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let name = document.getElementById("reg_name").value;
let email = document.getElementById("reg_email").value;
let password = document.getElementById("reg_password").value;

sendRequest(
"https://enterpriselogin1.vercel.app/api/auth/register",
{name,email,password},
"regMsg"
);

});

</script>

</body>
</html>
